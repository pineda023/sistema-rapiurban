<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Logístico Rapiurban</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:20px}
.container{max-width:1100px;margin:auto;background:white;padding:20px;border-radius:10px}
h1{text-align:center}
h2{margin-top:30px}
label{font-weight:bold}
input,textarea,select{width:100%;padding:8px;margin:5px 0 15px 0}
button{padding:10px 15px;background:#2b7cff;color:white;border:none;border-radius:5px;cursor:pointer;margin-right:10px}
.guia{margin-top:30px;padding:20px;border:2px dashed #333;background:#fafafa}
.logo{text-align:center;font-size:22px;font-weight:bold;margin-bottom:10px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ccc;padding:8px;text-align:left}
th{background:#eee}
.estadoPendiente{color:orange;font-weight:bold}
.estadoRuta{color:blue;font-weight:bold}
.estadoEntregado{color:green;font-weight:bold}
.dashboard{display:flex;gap:20px;margin-top:20px}
.card{flex:1;background:#f1f1f1;padding:15px;border-radius:8px;text-align:center;font-size:20px}
</style>
</head>
<body>

<div class="container">

<h1>Sistema Logístico Rapiurban</h1>

<div class="dashboard">
<div class="card">Pendientes: <span id="pendientes">0</span></div>
<div class="card">En Ruta: <span id="ruta">0</span></div>
<div class="card">Entregados: <span id="entregados">0</span></div>
</div>

<h2>Datos del Comercio</h2>

<label>Nombre del comercio</label>
<input id="comercio">

<label>Teléfono del comercio</label>
<input id="telComercio">

<label>Dirección del comercio</label>
<input id="dirComercio">

<h2>Datos de Entrega</h2>

<label>Nombre del cliente</label>
<input id="cliente">

<label>Dirección de entrega</label>
<input id="dirEntrega">

<label>Teléfono del cliente</label>
<input id="telCliente">

<label>Precio</label>
<input id="precio">

<label>Piloto / Repartidor</label>
<input id="piloto">

<label>Estado del envío</label>
<select id="estado">
<option value="Pendiente">Pendiente</option>
<option value="En Ruta">En Ruta</option>
<option value="Entregado">Entregado</option>
</select>

<label>Observación</label>
<textarea id="obs"></textarea>

<button onclick="crearGuia()">Crear Guía</button>
<button onclick="imprimirGuia()">Imprimir Guía</button>

<div id="resultado"></div>

<h2>Control de Entregas</h2>

<table>
<thead>
<tr>
<th># Guía</th>
<th>Comercio</th>
<th>Cliente</th>
<th>Dirección</th>
<th>Teléfono</th>
<th>Precio</th>
<th>Piloto</th>
<th>Estado</th>
<th>Mapa</th>
</tr>
</thead>
<tbody id="tablaGuias"></tbody>
</table>

</div>

<script>

let contador = localStorage.getItem('contadorGuias') || 1
let guias = JSON.parse(localStorage.getItem('guias')) || []

function crearGuia(){

let comercio=document.getElementById('comercio').value
let telComercio=document.getElementById('telComercio').value
let dirComercio=document.getElementById('dirComercio').value

let cliente=document.getElementById('cliente').value
let dirEntrega=document.getElementById('dirEntrega').value
let telCliente=document.getElementById('telCliente').value
let precio=document.getElementById('precio').value
let piloto=document.getElementById('piloto').value
let estado=document.getElementById('estado').value
let obs=document.getElementById('obs').value

let numeroGuia = "RAP-" + contador

let guiaHTML=`
<div class="guia" id="guiaPrint">
<div class="logo">RAPIURBAN DELIVERY</div>

<b>Número de Guía:</b> ${numeroGuia}<br><br>

<b>Datos del Comercio</b><br>
${comercio}<br>
Tel: ${telComercio}<br>
Dirección: ${dirComercio}

<hr>

<b>Datos de Entrega</b><br>
Cliente: ${cliente}<br>
Dirección: ${dirEntrega}<br>
Teléfono: ${telCliente}<br>
Precio: $${precio}<br>
Piloto: ${piloto}<br>
Estado: ${estado}<br>
Observación: ${obs}
</div>
`

document.getElementById('resultado').innerHTML=guiaHTML

let mapa="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(dirEntrega)

let guiaData={numeroGuia,comercio,cliente,dirEntrega,telCliente,precio,piloto,estado,mapa}

guias.push(guiaData)

localStorage.setItem('guias',JSON.stringify(guias))

contador++
localStorage.setItem('contadorGuias',contador)

mostrarGuias()

}

function mostrarGuias(){

let tabla=""
let pendientes=0
let ruta=0
let entregados=0

guias.forEach(g=>{

let clase=""

if(g.estado=="Pendiente"){clase="estadoPendiente";pendientes++}
if(g.estado=="En Ruta"){clase="estadoRuta";ruta++}
if(g.estado=="Entregado"){clase="estadoEntregado";entregados++}


tabla+=`<tr>
<td>${g.numeroGuia}</td>
<td>${g.comercio}</td>
<td>${g.cliente}</td>
<td>${g.dirEntrega}</td>
<td>${g.telCliente}</td>
<td>$${g.precio}</td>
<td>${g.piloto}</td>
<td class="${clase}">${g.estado}</td>
<td><a href="${g.mapa}" target="_blank">Ver</a></td>
</tr>`

})


document.getElementById('tablaGuias').innerHTML=tabla


document.getElementById('pendientes').innerText=pendientes

document.getElementById('ruta').innerText=ruta

document.getElementById('entregados').innerText=entregados

}

function imprimirGuia(){

let contenido=document.getElementById('guiaPrint')

if(!contenido){
alert("Primero debes crear una guía")
return
}

let ventana=window.open('','','width=800,height=600')

ventana.document.write(contenido.innerHTML)

ventana.print()

}

mostrarGuias()

</script>

</body>
</html>
